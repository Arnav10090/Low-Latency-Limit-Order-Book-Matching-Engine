<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <style>
    .box { fill:#fffaf0; stroke:#6a737d; stroke-width:2; rx:8; }
    .label { font-family: Arial, sans-serif; font-size:13px; fill:#111; }
    .small { font-size:12px; fill:#333; }
    .arrow { stroke:#333; stroke-width:2; fill:none; marker-end:url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <rect class="box" x="30" y="30" width="220" height="90"/>
  <text class="label" x="140" y="60" text-anchor="middle">Producer</text>
  <text class="small" x="140" y="78" text-anchor="middle">creates OrderRequest</text>

  <rect class="box" x="280" y="30" width="240" height="90"/>
  <text class="label" x="400" y="60" text-anchor="middle">SPSC Queue</text>
  <text class="small" x="400" y="78" text-anchor="middle">stores OrderRequest by value</text>

  <rect class="box" x="550" y="30" width="260" height="90"/>
  <text class="label" x="680" y="60" text-anchor="middle">Engine Thread</text>
  <text class="small" x="680" y="78" text-anchor="middle">owns Order, Pool, Book, Trades</text>

  <path class="arrow" d="M250 75 L280 75"/>
  <path class="arrow" d="M520 75 L550 75"/>

  <rect class="box" x="210" y="160" width="220" height="90"/>
  <text class="label" x="320" y="190" text-anchor="middle">MemoryPool (engine-owned)</text>
  <text class="small" x="320" y="208" text-anchor="middle">pre-allocated Order storage</text>

  <rect class="box" x="460" y="160" width="220" height="90"/>
  <text class="label" x="570" y="190" text-anchor="middle">OrderBook</text>
  <text class="small" x="570" y="208" text-anchor="middle">price levels & FIFO queues</text>

  <path class="arrow" d="M670 120 L670 160"/>
  <path class="arrow" d="M400 120 L400 160"/>

  <text class="small" x="60" y="260">Ownership notes: producers never dereference `Order*`; engine allocates and deallocates from the pool.</text>

</svg>
